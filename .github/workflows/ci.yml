name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run unit tests (FAQ toggle, SEO, booking)
        run: bun run test
      - name: Run SEO diagnostics scan (fails on duplicates / bad image URLs)
        run: bun run scripts/seo-diagnostics.ts
